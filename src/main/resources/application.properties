spring.application.name=logisticms
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
server.error.include-message=always
server.error.include-binding-errors=always
# Platform-safe port handling
server.port=${PORT:8081}
server.servlet.context-path=/api/logistics

# Default profile (dev locally, prod via env)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Common JPA config
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

opencage.api.key=${OPEN_CAGE_API_KEY}

aws.cognito.region=${AWS_COGNITO_REGION}
aws.cognito.user-pool-id=${AWS_COGNITO_USER_POOL_ID}
aws.cognito.client-id=${AWS_COGNITO_CLIENT_ID}
aws.cognito.issuer=${AWS_COGNITO_ISSUER:https://cognito-idp.${AWS_COGNITO_REGION}.amazonaws.com/${AWS_COGNITO_USER_POOL_ID}}
aws.cognito.jwk-set-uri=${AWS_COGNITO_JWK_SET_URI:${aws.cognito.issuer}/.well-known/jwks.json}

